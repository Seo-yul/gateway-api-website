baseURL = "/"
title = "Kubernetes Gateway API"

# Hugo allows theme composition (and inheritance). The precedence is from left to right.
theme = ["docsy"]
themesDir = "node_modules"

# Language settings
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Adopt a global timezone
timeZone = "UTC"

enableRobotsTXT = true
disableBrowserError = true
enableMissingTranslationPlaceholders = false

disableKinds = ["taxonomy"]

ignoreFiles = [ "(?:^|/)OWNERS$", "README[-]+[a-z]*\\.md", "^node_modules$" ]

timeout = "180s"

# Enable Git variables like commit, lastmod
enableGitInfo = true

[caches]
 [caches.assets]
  dir = ":cacheDir/_gen"
  maxAge = -1
 [caches.getcsv]
  dir = ":cacheDir/:project"
  maxAge = "60s"
 [caches.getresource]
  dir = ":cacheDir/:project"
  maxAge = "60s"
 [caches.images]
  dir = ":cacheDir/_images"
  maxAge = -1
 [caches.modules]
  dir = ":cacheDir/modules"
  maxAge = -1

[markup]
 [markup.goldmark]
   [markup.goldmark.extensions]
     definitionList = true
     table = true
     typographer = false
   [markup.goldmark.parser]
     attribute = true
     autoHeadingID = true
     autoHeadingIDType = "blackfriday"
   [markup.goldmark.renderer]
     unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "emacs"
    tabWidth = 4
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[frontmatter]
date = ["date", ":filename", "publishDate", "lastmod"]

[sitemap]
  filename = "sitemap.xml"
  priority = 0.75

# Be explicit about the output formats.
[outputs]
home = [ "HTML", "RSS" ]
page = [ "HTML" ]
section = [ "HTML", "print" ]

# Image processing configuration.
[imaging]
resampleFilter = "CatmullRom"
quality = 75
anchor = "smart"

[params]
description = "Kubernetes Gateway API"
showedit = true

# GitHub repository link for editing a page and opening issues.
github_repo = "https://github.com/kubernetes-sigs/gateway-api"
github_branch = "main"

# Searching
offlineSearch = false

# User interface configuration
[params.ui]
# Enable to show the side bar menu in its compact state.
sidebar_menu_compact = false
# Show this many levels in compact mode
ul_show = 3
# Show expand/collapse icon for sidebar sections.
sidebar_menu_foldable = true
# https://github.com/gohugoio/hugo/issues/8918#issuecomment-903314696
sidebar_cache_limit = 1
# Set to true to disable breadcrumb navigation.
breadcrumb_disable = false
# Set to true to hide the sidebar search box
sidebar_search_disable = false
# Set to false if you don't want to display a logo in the top nav bar
navbar_logo = true
# Set to true to disable the About link in the site footer
footer_about_disable = false

# Feedback section at the bottom of each doc page
[params.ui.feedback]
enable = true
yes = 'Glad to hear it! Please <a href="https://github.com/kubernetes-sigs/gateway-api/issues/new">tell us how we can improve</a>.'
no = 'Sorry to hear that. Please <a href="https://github.com/kubernetes-sigs/gateway-api/issues/new">tell us how we can improve</a>.'

[params.links]
# Links displayed on the right side of footer.
[[params.links.developer]]
	name = "Gateway API Website"
	url = "https://gateway-api.sigs.k8s.io/"
	icon = "fa-solid fa-globe"

[[params.links.developer]]
	name = "Slack"
	url = "https://kubernetes.slack.com/archives/CR0H13KGA"
	icon = "fa-brands fa-slack"

[[params.links.developer]]
	name = "GitHub"
	url = "https://github.com/kubernetes-sigs/gateway-api"
	icon = "fa-brands fa-github"

[[menu.main]]
  name = "Overview"
  weight = 1
  url = "/overview/"

[[menu.main]]
  name = "Guides"
  weight = 2
  url = "/guides/"

[[menu.main]]
  name = "Reference"
  weight = 3
  url = "/reference/"

[[menu.main]]
  name = "Enhancements"
  weight = 4
  url = "/geps/"

[[menu.main]]
  name = "Contributing"
  weight = 5
  url = "/contributing/"

# Language definitions.

[languages]
[languages.en]
title = "Kubernetes Gateway API"
languageName = "English"
weight = 1
languagedirection = "ltr"

[languages.en.params]
description = "Kubernetes Gateway API"

[languages.ko]
title = "Kubernetes Gateway API"
languageName = "한국어 (Korean)"
weight = 2
contentDir = "content/ko"
languagedirection = "ltr"

[languages.ko.params]
time_format_blog = "2006.01.02"
language_alternatives = ["en"]
description = "Kubernetes Gateway API"
languageNameLatinScript = "Korean"

# i18n module mounts
[[module.mounts]]
source = "i18n/en"
target = "i18n"

[[module.mounts]]
source = "i18n/ko"
target = "i18n"
